name: Deploy to Hostinger (via VPS)
on:
  push:
    branches: [ master ]
    paths-ignore: [ '**.md' ]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (forced-command roda intestino-deploy.sh)
        run: |
          install -d -m 700 ~/.ssh
          printf '%s' "${{ secrets.VPS_DEPLOY_KEY }}" | tr -d '\r\n ' | base64 -d > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H 187.77.35.118 >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no root@187.77.35.118 true
